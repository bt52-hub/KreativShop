vich_uploader:
    db_driver: orm

    mappings:
        artwork_image:
            uri_prefix: /uploads/artworks
            upload_destination: '%kernel.project_dir%/public/uploads/artworks'
            namer: Vich\UploaderBundle\Naming\UniqidNamer

        user_avatar:
            uri_prefix: /uploads/avatars
            upload_destination: '%kernel.project_dir%/public/uploads/avatars'
            namer: Vich\UploaderBundle\Naming\UniqidNamer

